<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orders — KidsCart Admin</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>window._ioStub={on:()=>{},emit:()=>{},to:()=>window._ioStub,disconnect:()=>{}};</script>
<script src="/admin/shared.js"></script>
</head>
<body>
<div id="loginScreen" style="display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2d0a47,#4A1070,#1a0a2e);">
  <div style="background:#fff;border-radius:24px;padding:44px 40px;width:380px;max-width:96vw;box-shadow:0 24px 64px rgba(0,0,0,.25);">
    <div style="text-align:center;margin-bottom:28px;"><img src="https://res.cloudinary.com/dhqjytd0e/image/upload/v1772393179/Kids_Cart_Brand_Identity_AW2_1_-01_phqsob.png" alt="KidsCart" style="height:80px;object-fit:contain;"></div>
    <h2 style="text-align:center;font-family:'Poppins',sans-serif;color:#1a0a2e;font-size:1.4rem;font-weight:800;margin-bottom:6px;">Welcome back</h2>
    <p style="text-align:center;color:#999;font-size:.85rem;margin-bottom:28px;">Sign in to your admin panel</p>
    <div class="fgroup"><label>Email</label><input type="email" id="adminEmail" placeholder="admin@kidscart.kids" autocomplete="username"></div>
    <div class="fgroup"><label>Password</label><input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()"></div>
    <button class="btn-full" onclick="adminLogin()" style="margin-top:8px;">Sign In →</button>
    <p style="text-align:center;margin-top:16px;font-size:.82rem;"><a href="#" onclick="document.getElementById('forgotBox').style.display=document.getElementById('forgotBox').style.display==='none'?'block':'none'" style="color:#4A1070;font-weight:700;">Forgot password?</a></p>
    <div id="forgotBox" style="display:none;margin-top:10px;">
      <div class="fgroup"><label>Your email</label><input type="email" id="forgotEmail" placeholder="admin@kidscart.kids"></div>
      <button class="btn-full" onclick="adminForgot()">Send Reset Link</button>
    </div>
    <div id="loginErr" style="color:#c62828;font-size:.82rem;text-align:center;margin-top:12px;display:none;padding:8px;background:#ffebee;border-radius:8px;"></div>
  </div>
</div>

<div id="adminApp" style="display:none;">
  <div id="mobMount"></div>
  <div id="sidebarMount"></div>
  <div class="main" id="mainArea">
    <div class="topbar">
      <h2 class="page-title">📦 Orders</h2>
      <div class="topbar-right">
        <span class="admin-badge" id="adminName">Admin</span>
        <a href="/" target="_blank" class="view-shop-btn">🛍️ View Shop</a>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-head">
          <span class="card-title">All Orders</span>
          <button class="card-action" onclick="loadOrders()">↻ Refresh</button>
        </div>
        <div class="search-bar">
          <input type="text" id="orderSearch" placeholder="Search by Order ID or customer name…" oninput="filterOrders()">
          <select id="orderStatusFilter" onchange="filterOrders()">
            <option value="">All Status</option>
            <option value="placed">Placed</option><option value="confirmed">Confirmed</option>
            <option value="processing">Processing</option><option value="shipped">Shipped</option>
            <option value="out_for_delivery">Out for Delivery</option><option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="ordersTable"><tr><td colspan="8" style="text-align:center;color:#bbb;padding:28px;">Loading orders…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal-box">
    <div class="modal-head"><h3>📦 Update Order #<span id="modalOrderId"></span></h3><button class="modal-close" onclick="closeOrderModal()">✕</button></div>
    <div class="modal-body">
      <div class="fgroup"><label>Order Status</label>
        <select id="modalStatus"><option value="placed">Placed</option><option value="confirmed">Confirmed</option><option value="processing">Processing</option><option value="shipped">Shipped</option><option value="out_for_delivery">Out for Delivery</option><option value="delivered">Delivered</option><option value="cancelled">Cancelled</option><option value="returned">Returned</option></select>
      </div>
      <div class="grid2">
        <div class="fgroup"><label>Payment Method</label><select id="modalPayMethod"><option value="cod">COD</option><option value="upi">UPI</option><option value="card">Card</option><option value="netbanking">Net Banking</option></select></div>
        <div class="fgroup"><label>Payment Status</label><select id="modalPayStatus"><option value="pending">Pending</option><option value="paid">Paid ✅</option><option value="failed">Failed</option><option value="refunded">Refunded</option></select></div>
      </div>
      <div class="fgroup"><label>Message to Customer (optional)</label><textarea id="modalMsg" placeholder="e.g. Your order is on the way!"></textarea></div>
      <input type="hidden" id="modalOrderDbId">
      <button class="btn-full" onclick="updateOrderStatus()">✅ Save Changes</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="orderDetailModal">
  <div class="modal-box wide">
    <div class="modal-head"><h3>📦 Order Details</h3><button class="modal-close" onclick="closeOrderDetail()">✕</button></div>
    <div class="modal-body" id="ordDetailBody">Loading…</div>
  </div>
</div>
<div id="toast"></div>

<script>
let ordersData = [];
window._kcAfterLogin = function(user) {
  document.getElementById('sidebarMount').innerHTML = renderSidebar('orders');
  document.getElementById('mobMount').innerHTML     = renderMobBar('orders');
  initSidebarState();
  showAdminApp();
  document.getElementById('adminName').textContent = '👤 '+(user.name||'Admin');
  loadOrders();
};
window.addEventListener('DOMContentLoaded', () => { document.getElementById('loginScreen').style.display='flex'; KC.init(window._kcAfterLogin); });

async function loadOrders() {
  try { const r=await apiFetch('/admin/orders?limit=200'); ordersData=r.orders||[]; renderOrders(ordersData); }
  catch(e) { document.getElementById('ordersTable').innerHTML=`<tr><td colspan="8" style="text-align:center;color:#c62828;padding:24px;">${e.message}</td></tr>`; }
}
function renderOrders(orders) {
  const el=document.getElementById('ordersTable'); const isSA=KC.getUser()?.role==='super_admin';
  if(!orders.length){el.innerHTML='<tr><td colspan="8" style="text-align:center;color:#bbb;padding:28px;">No orders found</td></tr>';return;}
  el.innerHTML=orders.map(o=>`<tr>
    <td><b style="color:#4A1070;">#${o.orderId}</b></td>
    <td><span style="display:inline-flex;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4A1070,#7B2D8B);align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.68rem;margin-right:7px;vertical-align:middle;">${(o.user?.name||'?').charAt(0).toUpperCase()}</span>${o.user?.name||'—'}<br><small style="color:#bbb;">${o.user?.email||''}</small></td>
    <td>${o.items?.length||0}</td>
    <td><b>₹${(o.total||0).toLocaleString('en-IN')}</b></td>
    <td><span style="font-weight:700;font-size:.8rem;">${(o.payment?.method||'COD').toUpperCase()}</span><br><small style="color:${o.payment?.status==='paid'?'#00a651':'#f7941d'};">${o.payment?.status||'pending'}</small></td>
    <td style="color:#999;font-size:.8rem;">${fmtDate(o.createdAt)}</td>
    <td><span class="badge b-${o.status}">${o.status}</span></td>
    <td><div style="display:flex;gap:5px;">
      <button class="btn btn-ok-g btn-sm" onclick="openOrderModal('${o._id}','${o.orderId}','${o.status}','${o.payment?.method||'cod'}','${o.payment?.status||'pending'}')">✏️</button>
      <button class="btn btn-ghost btn-sm" onclick="viewOrderDetail('${o._id}')">👁</button>
      ${isSA?`<button class="btn btn-er-g btn-sm" onclick="deleteOrder('${o._id}','${o.orderId}')">🗑</button>`:''}
    </div></td>
  </tr>`).join('');
}
function filterOrders() {
  const s=document.getElementById('orderSearch').value.toLowerCase(); const st=document.getElementById('orderStatusFilter').value;
  let f=ordersData; if(s)f=f.filter(o=>o.orderId?.toLowerCase().includes(s)||o.user?.name?.toLowerCase().includes(s)); if(st)f=f.filter(o=>o.status===st); renderOrders(f);
}
function openOrderModal(dbId,orderId,status,payMethod,payStatus) {
  document.getElementById('modalOrderDbId').value=dbId; document.getElementById('modalOrderId').textContent=orderId;
  document.getElementById('modalStatus').value=status; document.getElementById('modalPayMethod').value=payMethod.toLowerCase();
  document.getElementById('modalPayStatus').value=payStatus; document.getElementById('modalMsg').value='';
  document.getElementById('orderModal').style.display='flex';
}
function closeOrderModal(){document.getElementById('orderModal').style.display='none';}
async function updateOrderStatus() {
  const id=document.getElementById('modalOrderDbId').value; const status=document.getElementById('modalStatus').value;
  const message=document.getElementById('modalMsg').value.trim(); const payM=document.getElementById('modalPayMethod').value; const payS=document.getElementById('modalPayStatus').value;
  try { await apiFetch(`/admin/orders/${id}/status`,'PUT',{status,message}); await apiFetch(`/admin/orders/${id}/payment`,'PUT',{method:payM,status:payS}); toast('✅ Order updated!'); closeOrderModal(); loadOrders(); }
  catch(e){toast('❌ '+e.message);}
}
async function deleteOrder(id,orderId){if(!confirm(`Delete order #${orderId}?`))return;try{await apiFetch(`/admin/orders/${id}`,'DELETE');toast('🗑 Deleted');loadOrders();}catch(e){toast('❌ '+e.message);}}
async function viewOrderDetail(id) {
  const modal=document.getElementById('orderDetailModal'); const body=document.getElementById('ordDetailBody');
  modal.style.display='flex'; body.innerHTML='<div style="text-align:center;padding:40px;color:#bbb;">Loading…</div>';
  try {
    const o=await apiFetch('/admin/orders/'+id); const order=o.order||o;
    const items=(order.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f5f0fb;font-size:.84rem;"><span>${i.emoji||'🛍️'} ${i.name} (${i.size||'—'}) ×${i.qty}</span><span style="font-weight:700;">₹${((i.price||0)*i.qty).toLocaleString('en-IN')}</span></div>`).join('');
    const tracking=(order.tracking||[]).map(t=>`<div style="display:flex;gap:10px;padding:8px 0;font-size:.82rem;"><span style="color:#00a651;">●</span><div><strong>${t.status}</strong> — ${t.message||''}<br><small style="color:#bbb;">${t.time?new Date(t.time).toLocaleString('en-IN'):''}</small></div></div>`).join('');
    body.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div><div style="font-size:.7rem;font-weight:800;color:#4A1070;text-transform:uppercase;margin-bottom:6px;">Customer</div><div style="font-weight:700;">${order.user?.name||'—'}</div><div style="font-size:.82rem;color:#999;">${order.user?.email||''}</div><div style="font-size:.82rem;color:#999;">${order.user?.phone||''}</div></div>
      <div><div style="font-size:.7rem;font-weight:800;color:#4A1070;text-transform:uppercase;margin-bottom:6px;">Shipping Address</div><div style="font-size:.82rem;line-height:1.7;">${order.shippingAddress?.name||''}, ${order.shippingAddress?.phone||''}<br>${order.shippingAddress?.line1||''}${order.shippingAddress?.line2?', '+order.shippingAddress.line2:''}<br>${order.shippingAddress?.city||''}, ${order.shippingAddress?.state||''} — ${order.shippingAddress?.pincode||''}</div></div>
    </div>
    <div style="font-size:.7rem;font-weight:800;color:#4A1070;text-transform:uppercase;margin-bottom:8px;">Items</div>${items}
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:.88rem;"><span>Subtotal</span><span>₹${(order.subtotal||0).toLocaleString('en-IN')}</span></div>
    ${order.discount>0?`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.88rem;color:#00a651;"><span>Discount</span><span>−₹${order.discount.toLocaleString('en-IN')}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.88rem;"><span>Delivery</span><span>${order.deliveryFee===0?'FREE':'₹'+order.deliveryFee}</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:1rem;font-weight:900;border-top:2px solid #f5f0fb;"><span>Total</span><span style="color:#4A1070;">₹${(order.total||0).toLocaleString('en-IN')}</span></div>
    <div style="margin-top:16px;"><div style="font-size:.7rem;font-weight:800;color:#4A1070;text-transform:uppercase;margin-bottom:8px;">Tracking</div>${tracking||'<div style="color:#bbb;font-size:.82rem;">No tracking yet</div>'}</div>
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div style="background:#f8f5fd;border-radius:12px;padding:14px;font-size:.82rem;"><div style="color:#999;font-size:.7rem;font-weight:800;text-transform:uppercase;">Payment</div><div style="font-weight:800;margin-top:4px;">${(order.payment?.method||'COD').toUpperCase()}</div><div style="color:${order.payment?.status==='paid'?'#00a651':'#f7941d'};">${order.payment?.status||'pending'}</div></div>
      <div style="background:#f8f5fd;border-radius:12px;padding:14px;font-size:.82rem;"><div style="color:#999;font-size:.7rem;font-weight:800;text-transform:uppercase;">Status</div><div style="margin-top:6px;"><span class="badge b-${order.status}">${order.status}</span></div></div>
    </div>
    <div style="margin-top:16px;text-align:right;"><button onclick="openOrderModal('${order._id}','${order.orderId}','${order.status}','${order.payment?.method||'cod'}','${order.payment?.status||'pending'}')" class="btn btn-pp">✏️ Update Status</button></div>`;
  } catch(e){body.innerHTML='<div style="color:#c62828;padding:16px;">Error: '+e.message+'</div>';}
}
function closeOrderDetail(){document.getElementById('orderDetailModal').style.display='none';}
document.addEventListener('click',e=>{if(e.target.id==='orderModal')closeOrderModal();if(e.target.id==='orderDetailModal')closeOrderDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeOrderModal();closeOrderDetail();}});
</script>
</body>
</html>
